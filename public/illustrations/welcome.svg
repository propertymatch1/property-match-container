<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#e0f7f4" opacity="0.3"/>
  
  <!-- Main Illustration Elements -->
  <!-- Document/Passport Icon -->
  <rect x="120" y="100" width="160" height="200" rx="8" fill="white" stroke="var(--color-primary, #00BFA5)" stroke-width="3"/>
  
  <!-- Header Lines -->
  <line x1="140" y1="130" x2="260" y2="130" stroke="var(--color-primary, #00BFA5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="150" x2="220" y2="150" stroke="var(--color-primary, #00BFA5)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Content Lines -->
  <line x1="140" y1="180" x2="260" y2="180" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="200" x2="260" y2="200" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="220" x2="240" y2="220" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Brand Icon/Logo Placeholder -->
  <circle cx="200" cy="260" r="20" fill="var(--color-primary, #00BFA5)" opacity="0.2"/>
  <path d="M200 250 L200 270 M190 260 L210 260" stroke="var(--color-primary, #00BFA5)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="120" r="8" fill="var(--color-primary, #00BFA5)" opacity="0.3"/>
  <circle cx="320" cy="280" r="12" fill="var(--color-primary, #00BFA5)" opacity="0.2"/>
  <circle cx="340" cy="140" r="6" fill="var(--color-primary, #00BFA5)" opacity="0.4"/>
  
  <!-- Checkmark Badge -->
  <circle cx="270" cy="110" r="20" fill="var(--color-primary, #00BFA5)"/>
  <path d="M262 110 L268 116 L278 104" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
